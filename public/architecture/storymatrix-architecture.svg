<svg width="1600" height="1120" viewBox="0 0 1600 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1600" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F4FF"/>
      <stop offset="1" stop-color="#EAF8FF"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="outGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 56px 'Inter', Arial, sans-serif; fill: #111827; }
      .sub { font: 500 24px 'Inter', Arial, sans-serif; fill: #334155; }
      .h { font: 700 28px 'Inter', Arial, sans-serif; fill: #0F172A; }
      .txt { font: 500 22px 'Inter', Arial, sans-serif; fill: #1F2937; }
      .mono { font: 600 20px 'JetBrains Mono', monospace; fill: #1E293B; }
      .chip { font: 600 18px 'Inter', Arial, sans-serif; fill: #FFFFFF; }
      .small { font: 500 18px 'Inter', Arial, sans-serif; fill: #334155; }
      .box { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 2; rx: 16; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1120" fill="url(#bgGrad)"/>
  <rect x="28" y="24" width="1544" height="1072" rx="28" fill="none" stroke="#C4B5FD" stroke-width="2"/>

  <text x="800" y="88" text-anchor="middle" class="title">STORYMATRIX-4D Methodology Architecture</text>
  <text x="800" y="126" text-anchor="middle" class="sub">VCU + 5-Agent MARL + 4D LWM + CTFE + DiT (STF + RLFP)</text>

  <rect x="76" y="170" width="252" height="182" class="box" filter="url(#softShadow)"/>
  <rect x="76" y="170" width="252" height="42" rx="12" fill="#7C3AED"/>
  <text x="202" y="198" text-anchor="middle" class="chip">Input Modalities</text>
  <text x="98" y="246" class="txt">• Text Prompt (T2V)</text>
  <text x="98" y="278" class="txt">• CRI / Visual Frames</text>
  <text x="98" y="310" class="txt">• Audio Condition</text>
  <text x="98" y="342" class="txt">• CVC Signals</text>

  <rect x="372" y="170" width="290" height="182" class="box" filter="url(#softShadow)"/>
  <rect x="372" y="170" width="290" height="42" rx="12" fill="#8B5CF6"/>
  <text x="517" y="198" text-anchor="middle" class="chip">Prompt Refiner + Multi-Agent</text>
  <text x="394" y="246" class="txt">• Segment Division Agent</text>
  <text x="394" y="278" class="txt">• Speech Creation Agent</text>
  <text x="394" y="310" class="txt">• Subtitle Creation Agent</text>

  <rect x="708" y="170" width="388" height="182" class="box" filter="url(#softShadow)"/>
  <rect x="708" y="170" width="388" height="42" rx="12" fill="#6D28D9"/>
  <text x="902" y="198" text-anchor="middle" class="chip">QMIX Mixing Network</text>
  <text x="730" y="246" class="txt">• Director Agent</text>
  <text x="730" y="278" class="txt">• Narrative / Editor Agent</text>
  <text x="914" y="246" class="txt">• Visual Agent</text>
  <text x="914" y="278" class="txt">• Audio-Reactive Agent</text>
  <text x="730" y="310" class="txt">• World Agent (4D Memory)</text>

  <rect x="1142" y="170" width="384" height="182" class="box" filter="url(#softShadow)"/>
  <rect x="1142" y="170" width="384" height="42" rx="12" fill="#2563EB"/>
  <text x="1334" y="198" text-anchor="middle" class="chip">VCU + 4D World Model</text>
  <text x="1164" y="246" class="txt">• Image / Audio / Spatial Encoders</text>
  <text x="1164" y="278" class="txt">• CTFE Memory Tokens</text>
  <text x="1164" y="310" class="txt">• Scene Geometry + Camera Motion</text>

  <path d="M328 262 H362" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M662 262 H698" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1096 262 H1132" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="160" y="408" width="1280" height="66" rx="16" fill="url(#coreGrad)"/>
  <text x="800" y="450" text-anchor="middle" class="chip">Video Generation Core</text>

  <rect x="108" y="518" width="330" height="156" class="box" filter="url(#softShadow)"/>
  <text x="128" y="560" class="h">Text Prompt t_j</text>
  <text x="128" y="594" class="txt">Scene/script description</text>
  <text x="128" y="628" class="small">Prompt tokens and control hints</text>

  <rect x="478" y="518" width="380" height="156" class="box" filter="url(#softShadow)"/>
  <text x="498" y="560" class="h">Condition Frame z_c</text>
  <text x="498" y="594" class="txt">Anchor frame / first-frame latent</text>
  <text x="498" y="628" class="small">VAE encoding for visual condition</text>

  <rect x="898" y="518" width="380" height="156" class="box" filter="url(#softShadow)"/>
  <text x="918" y="560" class="h">Noise Initialization z_n</text>
  <text x="918" y="594" class="txt">Gaussian noise for diffusion</text>
  <text x="918" y="628" class="small">VAE-encoded stochastic seed</text>

  <rect x="1318" y="518" width="220" height="156" class="box" filter="url(#softShadow)"/>
  <text x="1338" y="560" class="h">Memory z_m</text>
  <text x="1338" y="594" class="txt">M(i-1) latent</text>
  <text x="1338" y="628" class="small">Long-range recall</text>

  <path d="M438 596 H468" stroke="#16A34A" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M858 596 H888" stroke="#16A34A" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1278 596 H1308" stroke="#16A34A" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="92" y="718" width="430" height="236" rx="20" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2" filter="url(#softShadow)"/>
  <rect x="92" y="718" width="430" height="46" rx="12" fill="url(#memGrad)"/>
  <text x="308" y="748" text-anchor="middle" class="chip">Memory System / Matrix M</text>
  <text x="116" y="796" class="txt">• Keyframes + style references</text>
  <text x="116" y="828" class="txt">• Memory encoding E(m_i)</text>
  <text x="116" y="860" class="txt">• Binary mask M and sliding window</text>
  <text x="116" y="892" class="txt">• Dual temporal alignment (CTFE)</text>

  <rect x="562" y="718" width="536" height="236" rx="20" fill="#F3E8FF" stroke="#C4B5FD" stroke-width="2" filter="url(#softShadow)"/>
  <rect x="562" y="718" width="536" height="46" rx="12" fill="#7C3AED"/>
  <text x="830" y="748" text-anchor="middle" class="chip">Latent Fusion + Temporal Alignment</text>
  <text x="586" y="796" class="txt">z_c + z_c + z_m + Binary Mask M</text>
  <text x="586" y="828" class="txt">Temporal-aligned input for DiT backbone</text>
  <text x="586" y="860" class="txt">Negative / positive RoPE shift for continuity</text>
  <text x="586" y="892" class="txt">Input tuple: [z_i, z_z, z_m, M]</text>

  <rect x="1138" y="718" width="386" height="236" rx="20" fill="#ECFEFF" stroke="#67E8F9" stroke-width="2" filter="url(#softShadow)"/>
  <rect x="1138" y="718" width="386" height="46" rx="12" fill="#0891B2"/>
  <text x="1331" y="748" text-anchor="middle" class="chip">Diffusion Transformer Backbone</text>
  <text x="1162" y="796" class="txt">• Core DiT blocks (2B)</text>
  <text x="1162" y="828" class="txt">• Adaptive norm + cross-attn</text>
  <text x="1162" y="860" class="txt">• STF + RLFP for O(n·k) efficiency</text>
  <text x="1162" y="892" class="txt">• 4D-aware generation dynamics</text>

  <path d="M522 836 H552" stroke="#9333EA" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1098 836 H1128" stroke="#9333EA" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="1048" y="1000" width="492" height="86" rx="16" fill="url(#outGrad)" filter="url(#softShadow)"/>
  <text x="1294" y="1044" text-anchor="middle" class="chip">Final Output (3D-Causal VAE)</text>

  <rect x="548" y="1000" width="470" height="86" rx="16" fill="#FFF1F2" stroke="#FDA4AF" stroke-width="2"/>
  <text x="572" y="1038" class="mono">Generate shot → Update memory → Repeat</text>

  <path d="M1331 954 V990" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1040 1042 H1028" stroke="#E11D48" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M548 1042 H320 C240 1042 180 986 180 918 V760" stroke="#E11D48" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="80" y="1088" class="small">Inspired by the final presentation architecture board: M2V loop, memory matrix, CTFE continuity, and DiT generation core.</text>
</svg>
